title = "SparkScope Secret Detection"

[[rules]]
id = "sparkscope-anthropic-key"
description = "Anthropic API Key"
regex = '''sk-ant-[a-zA-Z0-9_-]{48,}'''

[[rules]]
id = "sparkscope-aws-access-key"
description = "AWS Access Key"
regex = '''AKIA[0-9A-Z]{16}'''

[[rules]]
id = "sparkscope-github-token"
description = "GitHub Token"
regex = '''gh[pousr]_[a-zA-Z0-9]{36,}'''

[[rules]]
id = "sparkscope-supabase-key"
description = "Supabase API Key"
regex = '''supabase_[a-z0-9]{20,}'''

[[rules]]
id = "sparkscope-database-url"
description = "Database Connection String with credentials"
regex = '''(?i)(postgres|mysql|mongodb)://[^\s:@/]+:[^\s:@/]+@'''

[[rules]]
id = "sparkscope-resend-key"
description = "Resend API Key"
regex = '''re_[a-zA-Z0-9]{20,}'''

[[rules]]
id = "sparkscope-nextauth-secret"
description = "NextAuth Secret"
regex = '''(?i)nextauth_secret\s*=\s*[a-zA-Z0-9+/=]{32,}'''

[[rules]]
id = "sparkscope-private-key"
description = "Private Key"
regex = '''-----BEGIN [A-Z ]+ PRIVATE KEY-----'''

[allowlist]
paths = [
    '''node_modules''',
    '''\.next''',
    '''\.git''',
    '''out''',
    '''\.vercel''',
    '''gitleaks\.toml''',
    '''\.gitleaksignore''',
    '''package-lock\.json''',
]
